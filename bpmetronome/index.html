<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BP Metronome</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/icons.css">

</head>
<body>
    <div class="navbar">
        <div class="row">
            <div class="setting-btn">
                <div class="icon icon-settings"></div>
            </div>
            <p class="logo">BP Metronome</p>
            <div class="time-sig">
                <p class="time-sig-text">4/4</p>
            </div>
        </div>
    </div>
    <div class="metronome-container">
        <div class="row">
            <p class="tempo">100</p>
        </div>
        <div class="row">
            <p class="bpm">BPM</p>
        </div>
        <div class="row circle-row">
            <!-- here the number of circles will be dynamic, based off of time signature -->
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>
        <div class="row">
            <div class="tap-btn">
                <p>TAP</p>
            </div>
        </div>
    </div>
    
</body>
</html>
